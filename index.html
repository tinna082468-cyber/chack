<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เช็คสถานะจ่ายเงิน</title>

<style>
table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:6px 10px;
}
</style>

</head>

<body>

<h2>เช็คสถานะจ่ายเงิน</h2>

<input type="text" id="name" placeholder="พิมพ์ชื่อ">
<button onclick="check()">ตรวจสอบ</button>

<div id="result"></div>

<script>

let sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSSMjGfzpkmtPcq2Ble2vH1_ouN8P9hCkE8c5cDwLmrKTn3fB1Z7RL8qGikOLWQRtDcGWmaGxRidkz7/pub?output=csv";

async function check(){

let result=document.getElementById("result");
result.innerHTML="กำลังตรวจสอบ...";

try{

let name=document.getElementById("name").value.trim().toLowerCase();

let res=await fetch(sheetURL);
let text=await res.text();

let rows=text.split("\n");

let found=false;
let html="<table><tr><th>สัปดาห์</th><th>สถานะ</th></tr>";

for(let i=0;i<rows.length;i++){

let col=rows[i].split(",");

if(col[1]){

let sheetName=col[1].toLowerCase();

if(sheetName.includes(name)){

found=true;

for(let w=4;w<=19;w++){

let week=w-3;

if(col[w]==="TRUE"){
html+="<tr><td>สัปดาห์ "+week+"</td><td>✅ จ่ายแล้ว</td></tr>";
}else{
html+="<tr><td>สัปดาห์ "+week+"</td><td>❌ ยังไม่จ่าย</td></tr>";
}

}

break;

}

}

}

html+="</table>";

if(!found){
result.innerHTML="ไม่พบชื่อ";
}else{
result.innerHTML=html;
}

}catch(err){

result.innerHTML="เกิดข้อผิดพลาดในการโหลดข้อมูล";

}

}

</script>

</body>
</html>
